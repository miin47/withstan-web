<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DearUs 초대</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fefcf8;
    }

    h1 {
      font-size: 1.5rem;
      color: #333;
    }

    p {
      color: #666;
      text-align: center;
      margin: 0.5rem 1rem 2rem;
    }

    .btn {
      display: block;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin: 8px;
      text-align: center;
    }

    .ios {
      background: #000;
      color: #fff;
    }

    .android {
      background: #01875f;
      color: #fff;
    }
  </style>
</head>

<body>
  <h1>DearUs에서 연결하기</h1>
  <p>앱을 설치하고 파트너의 초대를 수락하세요.</p>
  <a class="btn ios" href="https://apps.apple.com/app/id6760184777">App Store에서 받기</a>
  <a class="btn android"
    href="https://play.google.com/store/apps/details?id=com.withstan.dearus&listing=invite-code">Google Play에서 받기</a>
</body>

</html>
